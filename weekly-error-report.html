<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weekly Error Report · MWFC Receiving</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f1f5f9; }
    #root { min-height: 100vh; }
    .drop-zone {
      border: 1.5px dashed #94a3b8; border-radius: 16px;
      padding: 4rem 2rem; text-align: center; cursor: pointer; transition: all .3s;
    }
    .drop-zone:hover, .drop-zone.active { border-color: #0EA5E9; background: rgba(14,165,233,.06); }
    .btn-hover:hover { opacity: .85; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useCallback } = React;
const XLSX = window.XLSX;

const SHIFT_COLORS = { A:"#0EA5E9", B:"#8B5CF6", C:"#F59E0B" };
const DEPT_COLORS  = { Receiving:"#0EA5E9", Transfers:"#94A3B8" };

/* ── FISCAL CALENDAR ──────────────────────────────────────────
   Nordstrom FY2026: Week 1 begins February 1, 2026.
   Each fiscal week is exactly 7 days.
   ──────────────────────────────────────────────────────────── */
const FISCAL_START = new Date(2026, 1, 1); // Feb 1, 2026 (month is 0-indexed)

const MONTH_NAMES = [
  "January","February","March","April","May","June",
  "July","August","September","October","November","December"
];

function getFiscalWeekDates(weekNum) {
  const start = new Date(FISCAL_START);
  start.setDate(start.getDate() + (weekNum - 1) * 7);
  const end = new Date(start);
  end.setDate(end.getDate() + 6);
  return { start, end };
}

function getFiscalWeekLabel(weekNum) {
  const { start, end } = getFiscalWeekDates(weekNum);
  const startStr = `${MONTH_NAMES[start.getMonth()]} ${start.getDate()}`;
  const endStr   = `${MONTH_NAMES[end.getMonth()]} ${end.getDate()}, ${end.getFullYear()}`;
  return `${startStr} – ${endStr}`;
}

function getFiscalWeekShort(weekNum) {
  const { start, end } = getFiscalWeekDates(weekNum);
  const fmt = d => `${MONTH_NAMES[d.getMonth()].slice(0,3)} ${d.getDate()}`;
  return `${fmt(start)} – ${fmt(end)}`;
}

/* ── THEME ── */
function getTheme(mode) {
  const d = mode === "dark";
  return {
    pageBg:      d ? "linear-gradient(160deg,#0f172a,#111827)" : "linear-gradient(160deg,#f1f5f9,#e2e8f0)",
    card:        d ? "#111827" : "#ffffff",
    cardBorder:  d ? "#1e293b" : "#e2e8f0",
    textPrimary: d ? "#f1f5f9" : "#0f172a",
    textSecond:  d ? "#94a3b8" : "#475569",
    textMuted:   d ? "#64748b" : "#94a3b8",
    shadow:      d ? "0 2px 14px rgba(0,0,0,.35)" : "0 2px 12px rgba(0,0,0,.07)",
    trackBg:     d ? "#1e293b" : "#f1f5f9",
    rowAlt:      d ? "#0b1220" : "#f8fafc",
    inputBg:     d ? "#1e293b" : "#f8fafc",
    inputBorder: d ? "#334155" : "#e2e8f0",
  };
}

/* ── SVG BAR CHART ── */
function BarChartSVG({ data, t }) {
  const max = Math.max(...data.map(d => d.total), 1);
  const H = 110, W = 360;
  const barW = 52;
  const totalUsed = data.length * barW;
  const totalGap = W - totalUsed;
  const gap = totalGap / (data.length + 1);

  return (
    <svg width="100%" viewBox={`0 0 ${W} 185`} style={{ display:"block", margin:"0 auto" }}>
      {[0.25, 0.5, 0.75, 1].map(f => {
        const y = 20 + H - f * H;
        return <line key={f} x1={0} y1={y} x2={W} y2={y}
          stroke={t.cardBorder} strokeWidth={1} strokeDasharray="3 3" />;
      })}
      {data.map((d, i) => {
        const x    = gap + i * (barW + gap);
        const bh   = Math.max((d.total / max) * H, 4);
        const y    = 20 + H - bh;
        const fill = i === data.length - 1 ? "#7C3AED" : "#94A3B8";
        return (
          <g key={d.week}>
            <rect x={x} y={y} width={barW} height={bh} fill={fill} rx={5} />
            <text x={x + barW / 2} y={y - 7} textAnchor="middle" fontSize={13}
              fill={t.textPrimary} fontWeight="700">{d.total}</text>
            <text x={x + barW / 2} y={H + 42} textAnchor="middle" fontSize={12}
              fill={i === data.length - 1 ? "#7C3AED" : t.textSecond}
              fontWeight={i === data.length - 1 ? "700" : "400"}>{d.label}</text>
          </g>
        );
      })}
      <line x1={0} y1={H + 20} x2={W} y2={H + 20} stroke={t.cardBorder} strokeWidth={1} />
    </svg>
  );
}

/* ── SVG DONUT CHART ── */
function DonutChart({ data, t }) {
  const total = data.reduce((s, d) => s + d.value, 0);
  if (!total) return null;
  const cx = 100, cy = 100, outerR = 80, innerR = 50;
  let angle = -Math.PI / 2;
  const slices = data.map(d => {
    const sweep = (d.value / total) * 2 * Math.PI;
    const end   = angle + sweep;
    const large = sweep > Math.PI ? 1 : 0;
    const x1  = cx + outerR * Math.cos(angle), y1  = cy + outerR * Math.sin(angle);
    const x2  = cx + outerR * Math.cos(end),   y2  = cy + outerR * Math.sin(end);
    const ix1 = cx + innerR * Math.cos(end),   iy1 = cy + innerR * Math.sin(end);
    const ix2 = cx + innerR * Math.cos(angle), iy2 = cy + innerR * Math.sin(angle);
    const mid = angle + sweep / 2;
    const lx  = cx + (outerR + 18) * Math.cos(mid);
    const ly  = cy + (outerR + 18) * Math.sin(mid);
    const path = `M${x1},${y1} A${outerR},${outerR},0,${large},1,${x2},${y2} L${ix1},${iy1} A${innerR},${innerR},0,${large},0,${ix2},${iy2}Z`;
    const result = { path, color:d.color, lx, ly, pct:((d.value/total)*100).toFixed(1) };
    angle = end;
    return result;
  });
  return (
    <svg width="100%" viewBox="0 0 200 200" style={{ display:"block", maxWidth:220, margin:"0 auto" }}>
      {slices.map((s,i) => (
        <path key={i} d={s.path} fill={s.color} stroke={t.card} strokeWidth={3} />
      ))}
      {slices.map((s,i) => (
        <text key={i} x={s.lx} y={s.ly} textAnchor="middle" dominantBaseline="middle"
          fontSize={10} fill={t.textPrimary} fontWeight="700">{s.pct}%</text>
      ))}
    </svg>
  );
}

/* ── PARSING ── */
function isNoError(v) {
  const s = String(v || "").trim().toLowerCase();
  return !s || s === "no errors" || s === "no error";
}

function parseWeek(wb, weekNum) {
  const name = `Week ${weekNum}`;
  if (!wb.SheetNames.includes(name)) return null;
  const rows = XLSX.utils.sheet_to_json(wb.Sheets[name], { header:1, defval:"" });
  if (!rows || rows.length < 6) return null;

  const dataRows = rows.slice(5).filter(r => r && String(r[6]||"").trim());

  let total = 0;
  const shiftC = { A:0, B:0, C:0 };
  const deptC  = { recv:0, xfer:0 };
  const sErrs  = {}, pErrs = {}, cErrs = {}, procC = {};
  let firstId = null, lastId = null;

  dataRows.forEach(row => {
    const shift = String(row[9] ||"").replace(/\xa0/g,"").trim();
    const dept  = String(row[10]||"").replace(/\xa0/g,"").trim().toLowerCase();
    const wm    = String(row[6] ||"").trim();
    const se    = String(row[11]||"").trim();
    const pe    = String(row[12]||"").trim();
    const ce    = String(row[13]||"").trim();
    const id    = row[0];
    if (isNoError(se) && isNoError(pe) && isNoError(ce)) return;
    total++;
    if (id !== "" && firstId === null) firstId = id;
    if (id !== "") lastId = id;
    const sk = shift.toLowerCase().startsWith("a")?"A":shift.toLowerCase().startsWith("b")?"B":shift.toLowerCase().startsWith("c")?"C":null;
    if (sk) shiftC[sk]++;
    if (dept.includes("receiv")) deptC.recv++; else deptC.xfer++;
    if (wm) procC[wm] = (procC[wm]||0)+1;
    const add = (str, counter) => {
      if (isNoError(str)) return;
      str.split(";").forEach(e => { const t=e.trim(); if(t&&!isNoError(t)) counter[t]=(counter[t]||0)+1; });
    };
    add(se, sErrs); add(pe, pErrs); add(ce, cErrs);
  });

  const sortObj = o => Object.entries(o).sort((a,b)=>b[1]-a[1]).map(([name,value])=>({name,value}));
  return {
    total,
    idRange: firstId!==null&&lastId!==null ? `IDs ${firstId}–${lastId}` : "",
    shift: shiftC,
    deptSplit: [{ name:"Receiving", value:deptC.recv }, { name:"Transfers", value:deptC.xfer }],
    shipment: sortObj(sErrs), piece: sortObj(pErrs), carton: sortObj(cErrs),
    topProcessors: Object.entries(procC).filter(([,c])=>c>=3).sort((a,b)=>b[1]-a[1]).map(([name,count])=>({name,count})),
  };
}

function buildRolling(wb, weekNum) {
  const out = [];
  for (let i = Math.max(1, weekNum-3); i <= weekNum; i++) {
    const d = parseWeek(wb, i);
    if (d) out.push({
      week: `FW${i}`,
      label: getFiscalWeekShort(i),  // ← fiscal dates on bar chart x-axis
      total: d.total,
    });
  }
  return out;
}

function generateTakeaways(data, prevData, rolling, weekNum) {
  const fp = n => `${((n/data.total)*100).toFixed(1)}%`;
  const shiftArr = [["A",data.shift.A],["B",data.shift.B],["C",data.shift.C]].sort((a,b)=>b[1]-a[1]);
  const topShift = shiftArr[0];
  const sT = data.shipment.reduce((s,r)=>s+r.value,0);
  const pT = data.piece.reduce((s,r)=>s+r.value,0);
  const cT = data.carton.reduce((s,r)=>s+r.value,0);
  const cpArr = [["Shipment",sT,data.shipment],["Piece",pT,data.piece],["Carton",cT,data.carton]].sort((a,b)=>b[1]-a[1]);
  const topCP = cpArr[0];
  const rollingAvg = rolling.length ? Math.round(rolling.reduce((s,d)=>s+d.total,0)/rolling.length) : null;
  const takes = [];
  takes.push({
    h: `${topShift[0]}-Shift leads with ${fp(topShift[1])} of errors`,
    b: `${topShift[0]}-Shift contributed ${topShift[1]} of ${data.total} total errors this week (${fp(topShift[1])}). ${shiftArr[1][1]>0?`${shiftArr[1][0]}-Shift follows with ${shiftArr[1][1]} (${fp(shiftArr[1][1])}).`:""}`,
  });
  if (prevData) {
    const delta = data.total - prevData.total;
    const pct   = ((delta/prevData.total)*100).toFixed(1);
    const dir   = delta<0?"down":delta>0?"up":"unchanged";
    takes.push({
      h: `Total errors ${dir} ${Math.abs(delta)} week over week`,
      b: `${data.total} errors this week (${getFiscalWeekShort(weekNum)}) vs. ${prevData.total} last week (${getFiscalWeekShort(weekNum-1)}) — ${delta>0?"+":""}${delta}, ${pct}%.${rollingAvg!==null?` The ${rolling.length}-week rolling average is ${rollingAvg} errors/week.`:""}`,
    });
  } else {
    takes.push({ h:"First week of data in this window", b:`${data.total} errors logged for ${getFiscalWeekShort(weekNum)} — no prior week available for comparison.` });
  }
  takes.push({
    h:`${topCP[0]} Check leads all checkpoints`,
    b:`${topCP[0]} errors account for ${topCP[1]} of ${data.total} entries (${fp(topCP[1])}).${topCP[2][0]?` The leading error type is "${topCP[2][0].name}" with ${topCP[2][0].value} instances.`:""}`,
  });
  return takes;
}

/* ── SMALL COMPONENTS ── */
function Badge({ children, color, bg }) {
  return <span style={{ fontSize:10, fontWeight:700, letterSpacing:1.2, textTransform:"uppercase",
    background:bg, color, padding:"3px 10px", borderRadius:20 }}>{children}</span>;
}

function Card({ t, children, style }) {
  return (
    <div style={{ background:t.card, border:`1px solid ${t.cardBorder}`, borderRadius:16,
      padding:"24px 26px 22px", marginBottom:20, boxShadow:t.shadow,
      transition:"background .25s,border-color .25s", ...style }}>
      {children}
    </div>
  );
}

function SectionHeader({ t, eyebrow, eyebrowColor, eyebrowBg, title, subtitle }) {
  return (
    <div style={{ marginBottom:18 }}>
      <Badge color={eyebrowColor} bg={eyebrowBg}>{eyebrow}</Badge>
      <h2 style={{ margin:"8px 0 4px", fontSize:19, fontWeight:800, color:t.textPrimary, letterSpacing:"-.3px" }}>{title}</h2>
      {subtitle && <p style={{ margin:0, fontSize:13, color:t.textSecond }}>{subtitle}</p>}
    </div>
  );
}

function CheckpointTable({ t, rows, total, accent, fmtPct }) {
  if (!rows.length) return (
    <div style={{ marginTop:10, padding:"14px 10px", textAlign:"center",
      color:t.textMuted, fontSize:13, fontStyle:"italic" }}>
      No errors logged at this checkpoint this week.
    </div>
  );
  return (
    <div style={{ marginTop:10 }}>
      <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13.5 }}>
        <tbody>
          {rows.map((r,i) => (
            <tr key={r.name} style={{ background:i%2?t.rowAlt:"transparent" }}>
              <td style={{ padding:"8px 10px", color:t.textPrimary }}>{r.name}</td>
              <td style={{ padding:"8px 10px", textAlign:"right", fontWeight:700, color:t.textPrimary }}>{r.value}</td>
              <td style={{ padding:"8px 10px", textAlign:"right", color:t.textMuted, width:64 }}>{fmtPct(r.value)}</td>
            </tr>
          ))}
        </tbody>
      </table>
      <div style={{ display:"flex", justifyContent:"space-between", marginTop:10, paddingTop:10,
        borderTop:`1px solid ${t.cardBorder}` }}>
        <span style={{ fontSize:12, fontWeight:700, color:t.textSecond, textTransform:"uppercase", letterSpacing:.5 }}>Checkpoint subtotal</span>
        <span style={{ fontSize:15, fontWeight:800, color:accent }}>{total} <span style={{ color:t.textMuted, fontWeight:600, fontSize:12 }}>({fmtPct(total)})</span></span>
      </div>
    </div>
  );
}

function NavBar({ t, dark, setMode, onChangeWeek, showChange }) {
  return (
    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:22 }}>
      <div style={{ display:"flex", gap:8, alignItems:"center" }}>
        <a href="./index.html" style={{ display:"inline-flex", alignItems:"center", gap:5,
          padding:"6px 14px", borderRadius:20, border:`1px solid ${t.cardBorder}`,
          background:t.card, color:t.textSecond, textDecoration:"none", fontSize:12,
          fontWeight:700, boxShadow:t.shadow }}>← Hub</a>
        {showChange && (
          <button onClick={onChangeWeek} style={{ background:"transparent",
            border:`1px solid ${t.cardBorder}`, color:t.textMuted, borderRadius:16,
            padding:"5px 12px", cursor:"pointer", fontSize:11, fontWeight:600 }}>
            ← Change Week
          </button>
        )}
      </div>
      <button onClick={()=>setMode(dark?"light":"dark")} style={{
        display:"flex", alignItems:"center", gap:6, background:t.card,
        border:`1px solid ${t.cardBorder}`, borderRadius:20, padding:"7px 12px",
        cursor:"pointer", fontSize:12, fontWeight:700, color:t.textPrimary, boxShadow:t.shadow }}>
        {dark ? "☀️ Light" : "🌙 Dark"}
      </button>
    </div>
  );
}

/* ── APP ── */
function App() {
  const [mode,    setMode]    = useState("light");
  const [wb,      setWb]      = useState(null);
  const [fileName,setFileName]= useState("");
  const [weekNum, setWeekNum] = useState(null);
  const [report,  setReport]  = useState(null);
  const [dragging,setDragging]= useState(false);
  const inputRef = useRef();
  const t    = getTheme(mode);
  const dark = mode === "dark";

  const availableWeeks = wb
    ? wb.SheetNames.filter(n=>n.startsWith("Week"))
        .map(n=>parseInt(n.replace("Week","").trim())).filter(Boolean).sort((a,b)=>a-b)
    : [];

  const loadFile = useCallback(file => {
    if (!file?.name.endsWith(".xlsx")) return;
    const reader = new FileReader();
    reader.onload = e => {
      const workbook = XLSX.read(new Uint8Array(e.target.result), { type:"array" });
      setWb(workbook); setFileName(file.name); setReport(null);
      const weeks = workbook.SheetNames.filter(n=>n.startsWith("Week"))
        .map(n=>parseInt(n.replace("Week","").trim())).filter(Boolean).sort((a,b)=>a-b);
      if (weeks.length) setWeekNum(weeks[weeks.length-1]);
    };
    reader.readAsArrayBuffer(file);
  }, []);

  const onDrop = e => { e.preventDefault(); setDragging(false); loadFile(e.dataTransfer.files[0]); };

  const runReport = () => {
    if (!wb || !weekNum) return;
    const data     = parseWeek(wb, weekNum);
    const prevData = weekNum > 1 ? parseWeek(wb, weekNum-1) : null;
    const rolling  = buildRolling(wb, weekNum);
    if (!data) return;
    setReport({ data, prevData, rolling, takeaways: generateTakeaways(data, prevData, rolling, weekNum), weekNum });
  };

  const reset = () => { setWb(null); setFileName(""); setWeekNum(null); setReport(null); };

  /* ── UPLOAD SCREEN ── */
  if (!wb) return (
    <div style={{ minHeight:"100vh", background:t.pageBg, fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif",
      padding:"28px 16px 60px", transition:"background .25s" }}>
      <div style={{ maxWidth:580, margin:"0 auto" }}>
        <NavBar t={t} dark={dark} setMode={setMode} showChange={false} />
        <div style={{ textAlign:"center", marginBottom:32 }}>
          <div style={{ fontSize:11, fontWeight:700, color:t.textMuted, letterSpacing:1, textTransform:"uppercase", marginBottom:8 }}>MWFC Receiving Operations</div>
          <h1 style={{ fontSize:28, fontWeight:800, color:t.textPrimary, letterSpacing:"-.5px" }}>Weekly Error Report</h1>
          <p style={{ fontSize:13, color:t.textSecond, marginTop:6 }}>Upload your workbook to generate the report</p>
        </div>
        <div className={`drop-zone${dragging?" active":""}`}
          style={{ background:t.card, borderColor:dragging?"#0EA5E9":t.inputBorder }}
          onDragOver={e=>{e.preventDefault();setDragging(true);}}
          onDragLeave={()=>setDragging(false)} onDrop={onDrop}
          onClick={()=>inputRef.current.click()}>
          <div style={{ fontSize:"2.5rem", marginBottom:12, opacity:.4 }}>📊</div>
          <p style={{ color:t.textSecond, fontWeight:600, marginBottom:4 }}>Drop AI Safe Weekly Error Data.xlsx here</p>
          <p style={{ fontSize:12, color:t.textMuted }}>or click to browse · .xlsx only</p>
          <input ref={inputRef} type="file" accept=".xlsx" style={{ display:"none" }}
            onChange={e=>loadFile(e.target.files[0])} />
        </div>
      </div>
    </div>
  );

  /* ── WEEK SELECTOR ── */
  if (!report) return (
    <div style={{ minHeight:"100vh", background:t.pageBg, fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif",
      padding:"28px 16px 60px", transition:"background .25s" }}>
      <div style={{ maxWidth:580, margin:"0 auto" }}>
        <NavBar t={t} dark={dark} setMode={setMode} showChange={false} />
        <Card t={t}>
          <div style={{ fontSize:11, fontWeight:700, color:t.textMuted, letterSpacing:1, textTransform:"uppercase", marginBottom:12 }}>Workbook Loaded</div>
          <p style={{ fontSize:13, color:"#16A34A", fontWeight:600, marginBottom:18 }}>✓ {fileName}</p>
          <label style={{ display:"block", fontSize:12, fontWeight:700, color:t.textSecond,
            textTransform:"uppercase", letterSpacing:.5, marginBottom:8 }}>Select Fiscal Week</label>
          <select value={weekNum||""} onChange={e=>setWeekNum(Number(e.target.value))}
            style={{ width:"100%", padding:"10px 14px", borderRadius:10, fontSize:14,
              border:`1px solid ${t.inputBorder}`, background:t.inputBg, color:t.textPrimary,
              marginBottom:16, cursor:"pointer" }}>
            {availableWeeks.map(w => (
              <option key={w} value={w}>
                Week {w} — {getFiscalWeekLabel(w)}
              </option>
            ))}
          </select>
          <button className="btn-hover" onClick={runReport} style={{
            width:"100%", padding:12, borderRadius:10, background:"#0EA5E9",
            color:"#fff", fontWeight:800, fontSize:14, border:"none", cursor:"pointer",
            boxShadow:"0 2px 10px rgba(14,165,233,.3)" }}>Generate Report →</button>
          <button onClick={reset} style={{ width:"100%", marginTop:10, padding:9, borderRadius:10,
            background:"transparent", color:t.textMuted, fontWeight:600, fontSize:13,
            border:`1px solid ${t.cardBorder}`, cursor:"pointer" }}>↑ Load Different File</button>
        </Card>
      </div>
    </div>
  );

  /* ── REPORT ── */
  const { data, prevData, rolling, takeaways } = report;
  const fmtPct    = n => `${((n/data.total)*100).toFixed(1)}%`;
  const weekLabel = getFiscalWeekLabel(report.weekNum);   // ← computed fiscal date
  const shiftArr  = [["A",data.shift.A,SHIFT_COLORS.A],["B",data.shift.B,SHIFT_COLORS.B],["C",data.shift.C,SHIFT_COLORS.C]].sort((a,b)=>b[1]-a[1]);
  const topShift  = shiftArr[0];
  const sTotal    = data.shipment.reduce((s,r)=>s+r.value,0);
  const pTotal    = data.piece.reduce((s,r)=>s+r.value,0);
  const cTotal    = data.carton.reduce((s,r)=>s+r.value,0);
  const topCP     = [["Shipment",sTotal],["Piece",pTotal],["Carton",cTotal]].sort((a,b)=>b[1]-a[1])[0];
  const delta     = prevData ? data.total - prevData.total : null;
  const pct       = prevData ? (delta/prevData.total)*100 : null;
  const improving = delta !== null && delta < 0;
  const flat      = delta === 0;
  const arrowColor= flat ? t.textMuted : improving ? "#16A34A" : "#DC2626";
  const arrow     = flat ? "→" : improving ? "↓" : "↑";
  const rollingAvg= rolling.length ? Math.round(rolling.reduce((s,d)=>s+d.total,0)/rolling.length) : 0;

  const shiftPieData = [
    { name:"A-Shift", value:data.shift.A, color:SHIFT_COLORS.A },
    { name:"B-Shift", value:data.shift.B, color:SHIFT_COLORS.B },
    { name:"C-Shift", value:data.shift.C, color:SHIFT_COLORS.C },
  ];
  const deptPieData = data.deptSplit.map(d => ({ ...d, color:DEPT_COLORS[d.name] }));

  return (
    <div style={{ background:t.pageBg, minHeight:"100vh", padding:"28px 16px 50px",
      fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif", transition:"background .25s" }}>
      <div style={{ maxWidth:720, margin:"0 auto" }}>

        <NavBar t={t} dark={dark} setMode={setMode} showChange={true} onChangeWeek={()=>setReport(null)} />

        {/* Title */}
        <div style={{ marginBottom:22 }}>
          <div style={{ fontSize:11, fontWeight:700, color:t.textMuted, letterSpacing:1,
            textTransform:"uppercase", marginBottom:6 }}>Receiving Research Error Form</div>
          <h1 style={{ margin:0, fontSize:26, fontWeight:800, color:t.textPrimary, letterSpacing:"-.5px" }}>
            Receiving Error Report — Week {report.weekNum}
          </h1>
          {/* Fiscal calendar date range — always computed, never read from workbook */}
          <p style={{ margin:"4px 0 0", fontSize:13, color:t.textSecond }}>
            {weekLabel}{data.idRange ? ` · ${data.idRange}` : ""}
          </p>
        </div>

        {/* Summary */}
        <Card t={t} style={{ padding:"18px 20px" }}>
          <div style={{ fontSize:11, fontWeight:700, color:t.textMuted, letterSpacing:1,
            textTransform:"uppercase", marginBottom:10 }}>Summary</div>
          <div style={{ display:"flex", flexWrap:"wrap", gap:10 }}>
            {[
              { label:"Total Errors",     value:data.total,                                  color:"#16A34A", bg:dark?"#16A34A22":"#dcfce7" },
              { label:"Busiest Shift",    value:`${topShift[0]} (${fmtPct(topShift[1])})`,   color:"#8B5CF6", bg:dark?"#8B5CF622":"#ede9fe" },
              { label:"Top Checkpoint",   value:topCP[0],                                    color:"#0284C7", bg:dark?"#0284C722":"#e0f2fe" },
              { label:"Processors w/ 3+", value:String(data.topProcessors.length),            color:"#B45309", bg:dark?"#B4530922":"#fef3c7" },
            ].map(s => (
              <div key={s.label} style={{ background:s.bg, border:`1px solid ${s.color}30`,
                borderRadius:10, padding:"9px 16px", flex:"1 1 130px" }}>
                <div style={{ fontSize:10.5, color:t.textSecond, marginBottom:2 }}>{s.label}</div>
                <div style={{ fontSize:17, fontWeight:800, color:s.color }}>{s.value}</div>
              </div>
            ))}
          </div>
        </Card>

        {/* Week-over-Week */}
        {prevData && (
          <Card t={t}>
            <SectionHeader t={t} eyebrow="Trend" eyebrowColor="#0D9488" eyebrowBg={dark?"#0D948822":"#ccfbf1"}
              title="Week-over-Week: Total Errors"
              subtitle={`${getFiscalWeekShort(report.weekNum)} vs. ${getFiscalWeekShort(report.weekNum-1)}`} />
            <div style={{ display:"flex", alignItems:"center", gap:18, marginTop:4 }}>
              <div style={{ textAlign:"center" }}>
                <div style={{ fontSize:11, color:t.textMuted }}>FW{report.weekNum-1}</div>
                <div style={{ fontSize:26, fontWeight:800, color:t.textSecond }}>{prevData.total}</div>
              </div>
              <div style={{ fontSize:30, fontWeight:800, color:arrowColor }}>{arrow}</div>
              <div style={{ textAlign:"center" }}>
                <div style={{ fontSize:11, color:t.textMuted }}>FW{report.weekNum}</div>
                <div style={{ fontSize:26, fontWeight:800, color:t.textPrimary }}>{data.total}</div>
              </div>
              <div style={{ marginLeft:"auto", textAlign:"right" }}>
                <div style={{ fontSize:20, fontWeight:800, color:arrowColor }}>
                  {delta>0?"+":""}{delta} ({pct>0?"+":""}{pct.toFixed(1)}%)
                </div>
                <div style={{ fontSize:11, color:t.textMuted }}>
                  {flat?"no change":improving?"fewer errors":"more errors"}
                </div>
              </div>
            </div>
          </Card>
        )}

        {/* 4-Week Rolling Trend */}
        {rolling.length >= 2 && (
          <Card t={t}>
            <SectionHeader t={t} eyebrow="Rolling Trend" eyebrowColor="#DC2626" eyebrowBg={dark?"#DC262622":"#fee2e2"}
              title="4-Week Rolling Review"
              subtitle={`${rolling[0].label} – ${rolling[rolling.length-1].label}`} />
            <BarChartSVG data={rolling} t={t} />
            <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13.5, marginTop:14 }}>
              <thead>
                <tr style={{ borderBottom:`1px solid ${t.cardBorder}` }}>
                  <th style={{ textAlign:"left",  padding:"6px 10px", fontSize:11, color:t.textMuted, textTransform:"uppercase" }}>Week</th>
                  <th style={{ textAlign:"left",  padding:"6px 10px", fontSize:11, color:t.textMuted, textTransform:"uppercase" }}>Dates</th>
                  <th style={{ textAlign:"right", padding:"6px 10px", fontSize:11, color:t.textMuted, textTransform:"uppercase" }}>Total</th>
                  <th style={{ textAlign:"right", padding:"6px 10px", fontSize:11, color:t.textMuted, textTransform:"uppercase" }}>Change</th>
                </tr>
              </thead>
              <tbody>
                {rolling.map((d,i) => {
                  const prev = i>0?rolling[i-1].total:null;
                  const delt = prev!==null?d.total-prev:null;
                  const dpct = prev!==null?(delt/prev)*100:null;
                  const col  = delt===null?t.textMuted:delt>0?"#DC2626":delt<0?"#16A34A":t.textMuted;
                  return (
                    <tr key={d.week} style={{ background:i%2?t.rowAlt:"transparent" }}>
                      <td style={{ padding:"7px 10px", color:t.textPrimary, fontWeight:i===rolling.length-1?800:600 }}>{d.week}</td>
                      <td style={{ padding:"7px 10px", color:t.textMuted, fontSize:12 }}>{d.label}</td>
                      <td style={{ padding:"7px 10px", textAlign:"right", fontWeight:700, color:t.textPrimary }}>{d.total}</td>
                      <td style={{ padding:"7px 10px", textAlign:"right", color:col }}>
                        {delt===null?"—":`${delt>0?"+":""}${delt} (${dpct>0?"+":""}${dpct.toFixed(1)}%)`}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
            <p style={{ fontSize:12.5, color:t.textSecond, margin:"14px 0 0", lineHeight:1.5 }}>
              {rolling.length}-week average: <strong>{rollingAvg} errors/week.</strong>{" "}
              {rolling[rolling.length-1].total < rollingAvg
                ? "This week is below the rolling average — a positive directional signal."
                : rolling[rolling.length-1].total > rollingAvg
                  ? "This week is above the rolling average — worth monitoring."
                  : "This week is right at the rolling average."}
            </p>
          </Card>
        )}

        {/* Shift */}
        <Card t={t}>
          <SectionHeader t={t} eyebrow="By Shift" eyebrowColor="#7C3AED" eyebrowBg={dark?"#7C3AED22":"#ede9fe"}
            title="Error Share by Shift" subtitle="A-Shift, B-Shift, C-Shift — % of total errors" />
          <DonutChart data={shiftPieData} t={t} />
          <div style={{ display:"flex", gap:8, marginTop:12 }}>
            {shiftPieData.map(d => (
              <div key={d.name} style={{ flex:1, textAlign:"center", padding:"8px 4px", borderRadius:10, background:t.trackBg }}>
                <div style={{ fontSize:11, color:t.textSecond }}>{d.name}</div>
                <div style={{ fontSize:16, fontWeight:800, color:d.color }}>{d.value}</div>
                <div style={{ fontSize:11, color:t.textMuted }}>{fmtPct(d.value)}</div>
              </div>
            ))}
          </div>
        </Card>

        {/* Dept */}
        <Card t={t}>
          <SectionHeader t={t} eyebrow="By Department" eyebrowColor="#0EA5E9" eyebrowBg={dark?"#0EA5E922":"#e0f2fe"}
            title="Receiving vs. Transfers" subtitle="Home Department — Receiving vs. all transfer departments combined" />
          <DonutChart data={deptPieData} t={t} />
          <div style={{ display:"flex", gap:8, marginTop:12 }}>
            {deptPieData.map(d => (
              <div key={d.name} style={{ flex:1, textAlign:"center", padding:"8px 4px", borderRadius:10, background:t.trackBg }}>
                <div style={{ fontSize:11, color:t.textSecond }}>{d.name}</div>
                <div style={{ fontSize:16, fontWeight:800, color:d.color }}>{d.value}</div>
                <div style={{ fontSize:11, color:t.textMuted }}>{fmtPct(d.value)}</div>
              </div>
            ))}
          </div>
        </Card>

        {/* Checkpoints */}
        <Card t={t}>
          <SectionHeader t={t} eyebrow="Checkpoints" eyebrowColor="#0284C7" eyebrowBg={dark?"#0284C722":"#e0f2fe"}
            title="Errors by Checkpoint" subtitle="Shipment, Piece, and Carton checks — error types found at each stage" />
          <div style={{ fontSize:13, fontWeight:800, color:t.textPrimary, marginTop:4 }}>Shipment Error Check</div>
          <CheckpointTable t={t} rows={data.shipment} total={sTotal} accent="#0284C7" fmtPct={fmtPct} />
          <div style={{ fontSize:13, fontWeight:800, color:t.textPrimary, marginTop:18 }}>Piece Error Check</div>
          <CheckpointTable t={t} rows={data.piece}    total={pTotal} accent="#0284C7" fmtPct={fmtPct} />
          <div style={{ fontSize:13, fontWeight:800, color:t.textPrimary, marginTop:18 }}>Carton Error Check</div>
          <CheckpointTable t={t} rows={data.carton}   total={cTotal} accent="#0284C7" fmtPct={fmtPct} />
        </Card>

        {/* Processors */}
        {data.topProcessors.length > 0 && (
          <Card t={t}>
            <SectionHeader t={t} eyebrow="Processors" eyebrowColor="#B45309" eyebrowBg={dark?"#B4530922":"#fef3c7"}
              title="Processors with 3+ Errors"
              subtitle={`${data.topProcessors.length} WM Sign-On ID${data.topProcessors.length!==1?"s":""} — ${data.topProcessors.reduce((s,p)=>s+p.count,0)} of ${data.total} errors (${fmtPct(data.topProcessors.reduce((s,p)=>s+p.count,0))})`} />
            <table style={{ width:"100%", borderCollapse:"collapse", fontSize:14, marginTop:4 }}>
              <thead>
                <tr style={{ borderBottom:`1px solid ${t.cardBorder}` }}>
                  <th style={{ textAlign:"left",  padding:"8px 10px", fontSize:11, color:t.textMuted, textTransform:"uppercase" }}>WM Sign-On</th>
                  <th style={{ textAlign:"right", padding:"8px 10px", fontSize:11, color:t.textMuted, textTransform:"uppercase" }}>Errors</th>
                  <th style={{ textAlign:"right", padding:"8px 10px", fontSize:11, color:t.textMuted, textTransform:"uppercase" }}>% of Total</th>
                </tr>
              </thead>
              <tbody>
                {data.topProcessors.map((p,i) => (
                  <tr key={p.name} style={{ background:i%2?t.rowAlt:"transparent" }}>
                    <td style={{ padding:"9px 10px", color:t.textPrimary, fontWeight:600 }}>{p.name}</td>
                    <td style={{ padding:"9px 10px", textAlign:"right", fontWeight:800, color:"#B45309" }}>{p.count}</td>
                    <td style={{ padding:"9px 10px", textAlign:"right", color:t.textMuted }}>{fmtPct(p.count)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </Card>
        )}

        {/* Takeaways */}
        <Card t={t}>
          <SectionHeader t={t} eyebrow="Analysis" eyebrowColor="#16A34A" eyebrowBg={dark?"#16A34A22":"#dcfce7"}
            title="Key Takeaways" />
          {takeaways.map(item => (
            <div key={item.h} style={{ marginBottom:14, paddingLeft:14,
              borderLeft:`3px solid ${dark?"#16A34A55":"#16A34A30"}` }}>
              <div style={{ fontSize:14, fontWeight:700, color:t.textPrimary, marginBottom:3 }}>{item.h}</div>
              <div style={{ fontSize:13, color:t.textSecond, lineHeight:1.5 }}>{item.b}</div>
            </div>
          ))}
        </Card>

        <p style={{ fontSize:11, color:t.textMuted, textAlign:"center", marginTop:8 }}>
          MWFC Receiving Operations · Internal Use Only · Not for distribution
        </p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
