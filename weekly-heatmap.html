<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Error Frequency Heatmap · MWFC</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg:#0f1623;--surface:#1a2235;--surface2:#222d42;--border:#2e3f5c;
  --accent:#38bdf8;--text:#e2e8f0;--muted:#94a3b8;--card-hover:#263550;
  --shift-a:#38bdf8;--shift-b:#818cf8;--shift-c:#fb923c;
}
[data-theme="light"]{
  --bg:#f0f4f8;--surface:#fff;--surface2:#e8eef5;--border:#cbd5e1;
  --accent:#0369a1;--text:#1e293b;--muted:#64748b;--card-hover:#dbeafe;
  --shift-a:#0369a1;--shift-b:#6d28d9;--shift-c:#c2410c;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .2s,color .2s;}

/* HEADER */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:.75rem 1.25rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;}
.header-left{display:flex;align-items:center;gap:.75rem;}
.back-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:.35rem .7rem;color:var(--text);font-size:.82rem;cursor:pointer;text-decoration:none;}
.back-btn:hover{background:var(--card-hover);}
.header-title{font-size:1rem;font-weight:700;}
.header-sub{font-size:.72rem;color:var(--muted);}
.theme-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:.35rem .7rem;color:var(--text);font-size:.82rem;cursor:pointer;}

/* UPLOAD */
#upload-section{max-width:580px;margin:4rem auto;padding:1.5rem;text-align:center;}
.upload-box{border:2px dashed var(--border);border-radius:16px;padding:3rem 2rem;cursor:pointer;transition:border-color .2s,background .2s;}
.upload-box:hover,.upload-box.drag{border-color:var(--accent);background:var(--surface);}
.upload-icon{font-size:2.5rem;margin-bottom:.75rem;}
.upload-title{font-size:1.1rem;font-weight:700;margin-bottom:.35rem;}
.upload-sub{font-size:.85rem;color:var(--muted);margin-bottom:1.25rem;}
.upload-btn-ui{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:.65rem 1.5rem;font-size:.95rem;font-weight:600;cursor:pointer;}
#file-input{display:none;}

/* CONTROLS */
#controls{display:none;background:var(--surface);border-bottom:1px solid var(--border);padding:.75rem 1.25rem;position:sticky;top:57px;z-index:15;}
.ctrl-row{display:flex;flex-wrap:wrap;gap:.6rem;align-items:center;}
.file-info{font-size:.75rem;color:var(--muted);margin-bottom:.5rem;}
.new-file-btn{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:.3rem .7rem;color:var(--text);font-size:.75rem;cursor:pointer;font-weight:600;}
.new-file-btn:hover{background:var(--card-hover);}

/* SHIFT TABS */
.shift-tabs{display:flex;gap:.4rem;}
.shift-tab{border:1px solid var(--border);border-radius:8px;padding:.4rem .85rem;font-size:.82rem;font-weight:700;cursor:pointer;background:var(--surface2);color:var(--muted);transition:all .15s;}
.shift-tab.active-a{background:rgba(56,189,248,.15);color:var(--shift-a);border-color:var(--shift-a);}
.shift-tab.active-b{background:rgba(129,140,248,.15);color:var(--shift-b);border-color:var(--shift-b);}
.shift-tab.active-c{background:rgba(251,146,60,.15);color:var(--shift-c);border-color:var(--shift-c);}

/* RAW/DELTA */
.mode-toggle{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.mode-btn{padding:.35rem .75rem;font-size:.78rem;font-weight:700;cursor:pointer;background:var(--surface2);color:var(--muted);border:none;}
.mode-btn.active{background:var(--accent);color:#fff;}

/* DEPT FILTER */
.dept-filters{display:flex;gap:.4rem;}
.dept-btn{border:1px solid var(--border);border-radius:999px;padding:.3rem .75rem;font-size:.75rem;font-weight:700;cursor:pointer;background:var(--surface2);color:var(--muted);display:flex;align-items:center;gap:.35rem;transition:all .15s;}
.dept-btn.active-recv{background:rgba(226,232,240,.1);color:var(--text);border-color:var(--text);}
.dept-btn.active-train{background:rgba(167,139,250,.15);color:#a78bfa;border-color:#a78bfa;}
.dept-dot{width:8px;height:8px;border-radius:50%;}
.dot-recv{background:var(--text);}
.dot-train{background:#a78bfa;}

/* STATS ROW */
.stats-row{display:flex;gap:1.5rem;align-items:center;padding:.5rem 0 0;}
.stat-item{text-align:center;}
.stat-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);}
.stat-value{font-size:1.1rem;font-weight:800;color:var(--accent);}

/* LEGEND */
.legend-row{display:flex;align-items:center;gap:.35rem;font-size:.7rem;color:var(--muted);}
.leg-box{width:20px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;}

/* HEATMAP */
#heatmap-section{display:none;padding:1rem 1.25rem;overflow-x:auto;}
.heatmap-container{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table.hmap{border-collapse:separate;border-spacing:3px;font-size:.75rem;}
table.hmap th{color:var(--muted);font-weight:600;padding:.2rem .25rem;text-align:center;white-space:nowrap;position:sticky;top:0;background:var(--bg);z-index:5;}
table.hmap th.proc-th{text-align:left;min-width:70px;position:sticky;left:0;background:var(--bg);z-index:6;}
table.hmap td.proc-cell{position:sticky;left:0;background:var(--bg);z-index:4;white-space:nowrap;padding:.15rem .4rem .15rem 0;font-size:.73rem;font-weight:700;font-family:monospace;}
table.hmap td.proc-cell .proc-name{display:inline;}
table.hmap td.proc-cell .trend{font-size:.65rem;margin-left:.2rem;}
table.hmap td.proc-cell .dept-dot-sm{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:.25rem;vertical-align:middle;}
table.hmap td.week-cell{width:30px;min-width:28px;height:28px;border-radius:5px;text-align:center;vertical-align:middle;font-weight:700;font-size:.75rem;cursor:default;transition:transform .1s;}
table.hmap td.week-cell:hover{transform:scale(1.2);z-index:3;position:relative;}
table.hmap td.divider-cell{width:2px;min-width:2px;background:var(--border);padding:0;}
table.hmap td.total-cell{font-size:.72rem;font-weight:800;color:var(--text);text-align:center;padding:0 .35rem;}
table.hmap tr.total-row td{background:var(--surface2)!important;color:var(--muted);font-weight:700;border-radius:4px;}
table.hmap tr.total-row td.proc-cell{background:var(--bg)!important;color:var(--muted);}

/* HEAT COLORS */
.h0{background:var(--surface2);color:transparent;}
.h1{background:#fbbf24;color:#78350f;}
.h2{background:#f97316;color:#fff;}
.h3{background:#ef4444;color:#fff;}
.h4{background:#b91c1c;color:#fff;}
.h5{background:#7f1d1d;color:#fca5a5;}

/* DELTA COLORS */
.dpos{background:#ef4444;color:#fff;}
.dneg{background:#34d399;color:#064e3b;}
.dzero{background:var(--surface2);color:var(--muted);}

.trend-up{color:#f87171;}
.trend-dn{color:#34d399;}
.trend-fl{color:var(--muted);}

.section-heading{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);padding:.75rem 0 .5rem;border-bottom:1px solid var(--border);margin-bottom:.5rem;}
</style>
</head>
<body data-theme="dark">

<header>
  <div class="header-left">
    <a href="index.html" class="back-btn">← Hub</a>
    <div>
      <div class="header-title">🗺️ Error Frequency Heatmap</div>
      <div class="header-sub">MWFC · Receiving · YTD 2026</div>
    </div>
  </div>
  <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">☀️ Light</button>
</header>

<!-- UPLOAD -->
<div id="upload-section">
  <div class="upload-box" id="drop-zone"
    onclick="document.getElementById('file-input').click()"
    ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="dropFile(event)">
    <div class="upload-icon">📂</div>
    <div class="upload-title">Upload Weekly Error Workbook</div>
    <div class="upload-sub">Reads all populated weeks automatically.<br>Data stays in your browser — never uploaded to any server.</div>
    <button class="upload-btn-ui" onclick="event.stopPropagation();document.getElementById('file-input').click()">Choose File</button>
  </div>
  <input type="file" id="file-input" accept=".xlsx,.xls" onchange="handleFile(event)"/>
</div>

<!-- CONTROLS -->
<div id="controls">
  <div class="file-info" id="file-info-label"></div>
  <div class="ctrl-row">
    <button class="new-file-btn" onclick="resetUpload()">↑ NEW FILE</button>
    <div class="shift-tabs" id="shift-tabs"></div>
    <div class="mode-toggle">
      <button class="mode-btn active" id="btn-raw" onclick="setMode('raw')">RAW</button>
      <button class="mode-btn" id="btn-delta" onclick="setMode('delta')">DELTA</button>
    </div>
    <div class="dept-filters">
      <button class="dept-btn active-recv" id="dept-recv" onclick="toggleDept('recv')">
        <span class="dept-dot dot-recv"></span>RECEIVING
      </button>
      <button class="dept-btn active-train" id="dept-train" onclick="toggleDept('train')">
        <span class="dept-dot dot-train"></span>TRAINING
      </button>
    </div>
  </div>
  <div class="ctrl-row" style="margin-top:.5rem;justify-content:space-between;flex-wrap:wrap;gap:.5rem;">
    <div class="stats-row" id="stats-row"></div>
    <div class="legend-row">
      <span>NONE</span>
      <div class="leg-box h0" style="color:var(--muted)">0</div>
      <div class="leg-box h1">1</div>
      <div class="leg-box h2">2</div>
      <div class="leg-box h3">3</div>
      <div class="leg-box h4">4</div>
      <div class="leg-box h5">5+</div>
      <span>PEAK</span>
      &nbsp;|&nbsp;
      <span class="trend-dn">▼</span><span style="font-size:.68rem">IMPR</span>
      <span class="trend-fl">→</span><span style="font-size:.68rem">STABLE</span>
      <span class="trend-up">▲</span><span style="font-size:.68rem">WORSE</span>
    </div>
  </div>
</div>

<!-- HEATMAP -->
<div id="heatmap-section">
  <div id="heatmap-container"></div>
</div>

<script>
let WB = null, allData = [], allWeeks = [], fileName = '';
let curShift = 'A-Shift', curMode = 'raw';
let deptRecv = true, deptTrain = true;

function toggleTheme(){
  const b=document.body,btn=document.getElementById('theme-btn');
  if(b.dataset.theme==='dark'){b.dataset.theme='light';btn.textContent='🌙 Dark';}
  else{b.dataset.theme='dark';btn.textContent='☀️ Light';}
  if(allData.length) renderHeatmap();
}
function dragOver(e){e.preventDefault();document.getElementById('drop-zone').classList.add('drag');}
function dragLeave(){document.getElementById('drop-zone').classList.remove('drag');}
function dropFile(e){e.preventDefault();document.getElementById('drop-zone').classList.remove('drag');const f=e.dataTransfer.files[0];if(f)processFile(f);}
function handleFile(e){const f=e.target.files[0];if(f)processFile(f);}
function resetUpload(){
  WB=null;allData=[];allWeeks=[];
  document.getElementById('upload-section').style.display='block';
  document.getElementById('controls').style.display='none';
  document.getElementById('heatmap-section').style.display='none';
}

function processFile(file){
  fileName=file.name;
  const reader=new FileReader();
  reader.onload=function(e){
    WB=XLSX.read(e.target.result,{type:'array',cellDates:true});
    parseAllWeeks();
    buildControls();
    renderHeatmap();
    document.getElementById('upload-section').style.display='none';
    document.getElementById('controls').style.display='block';
    document.getElementById('heatmap-section').style.display='block';
  };
  reader.readAsArrayBuffer(file);
}

function parseAllWeeks(){
  allData=[];allWeeks=[];
  const sheetNames=WB.SheetNames.filter(n=>/^Week \d+$/i.test(n));
  sheetNames.forEach(sheet=>{
    const wn=parseInt(sheet.replace(/\D/g,''));
    const raw=XLSX.utils.sheet_to_json(WB.Sheets[sheet],{header:1,defval:''});
    if(raw.length<6) return;
    const headers=raw[4].map(h=>String(h).trim().replace(/:$/,'').trim());
    const rows=raw.slice(5).filter(r=>r.some(c=>c!==''));
    const col=name=>{
      const e=headers.indexOf(name);
      if(e>=0) return e;
      return headers.findIndex(h=>h.toLowerCase().includes(name.toLowerCase()));
    };
    const iWM=col('WM SIGN ON'),iShift=col('Shift'),iDept=col('Home Department');
    rows.forEach(r=>{
      const wm=String(r[iWM]||'').trim();
      if(!wm||wm==='nan') return;
      const shift=String(r[iShift]||'').trim();
      const dept=String(r[iDept]||'').trim();
      allData.push({wm,shift,dept,week:wn});
    });
    if(rows.filter(r=>r.some(c=>c!=='')).length>0) allWeeks.push(wn);
  });
  allWeeks=[...new Set(allWeeks)].sort((a,b)=>a-b);

  // Update file info
  const lastWk=allWeeks[allWeeks.length-1];
  document.getElementById('file-info-label').textContent=`${fileName} · data thru Week ${lastWk} · ${allWeeks.length} weeks loaded`;
}

function buildControls(){
  // Shift tabs with totals
  const shifts=['A-Shift','B-Shift','C-Shift'];
  const shiftLabels=['A-Shift','B-Shift','C-Shift'];
  const shiftKeys=['a','b','c'];
  const tabs=document.getElementById('shift-tabs');
  tabs.innerHTML='';
  shifts.forEach((s,i)=>{
    const cnt=allData.filter(r=>r.shift===s).length;
    const btn=document.createElement('button');
    btn.className=`shift-tab${curShift===s?' active-'+shiftKeys[i]:''}`;
    btn.dataset.shift=s;
    btn.dataset.key=shiftKeys[i];
    btn.textContent=`${shiftLabels[i].replace('-Shift','-\nShift')} ${cnt}`;
    btn.innerHTML=`${shiftLabels[i]} <span style="font-size:.7rem">${cnt}</span>`;
    btn.onclick=()=>setShift(s,shiftKeys[i]);
    tabs.appendChild(btn);
  });
}

function setShift(s,key){
  curShift=s;
  document.querySelectorAll('.shift-tab').forEach(t=>t.className='shift-tab');
  const active=document.querySelector(`.shift-tab[data-shift="${s}"]`);
  if(active) active.className=`shift-tab active-${key}`;
  renderHeatmap();
}
function setMode(m){
  curMode=m;
  document.getElementById('btn-raw').className='mode-btn'+(m==='raw'?' active':'');
  document.getElementById('btn-delta').className='mode-btn'+(m==='delta'?' active':'');
  renderHeatmap();
}
function toggleDept(d){
  if(d==='recv') deptRecv=!deptRecv;
  else deptTrain=!deptTrain;
  document.getElementById('dept-recv').className='dept-btn'+(deptRecv?' active-recv':'');
  document.getElementById('dept-train').className='dept-btn'+(deptTrain?' active-train':'');
  renderHeatmap();
}

function isDeptShown(dept){
  const isRecv=dept.toLowerCase()==='receiving';
  const isTrain=dept.toLowerCase()==='training';
  if(isRecv && deptRecv) return true;
  if(isTrain && deptTrain) return true;
  if(!isRecv && !isTrain) return true; // always show other depts
  return false;
}

function renderHeatmap(){
  const filtered=allData.filter(r=>r.shift===curShift && isDeptShown(r.dept));

  // Build processor → week count map
  const procWeekMap={};
  const procDept={};
  filtered.forEach(r=>{
    if(!procWeekMap[r.wm]) procWeekMap[r.wm]={};
    procWeekMap[r.wm][r.week]=(procWeekMap[r.wm][r.week]||0)+1;
    procDept[r.wm]=r.dept;
  });

  // Sort processors by total descending
  const procs=Object.keys(procWeekMap).sort((a,b)=>{
    const ta=Object.values(procWeekMap[a]).reduce((s,v)=>s+v,0);
    const tb=Object.values(procWeekMap[b]).reduce((s,v)=>s+v,0);
    return tb-ta;
  });

  const weeks=allWeeks;
  const total=filtered.length;
  const associates=procs.length;
  const avg=associates>0?(total/associates).toFixed(1):0;

  // Stats
  document.getElementById('stats-row').innerHTML=`
    <div class="stat-item"><div class="stat-label">Associates</div><div class="stat-value">${associates}</div></div>
    <div class="stat-item"><div class="stat-label">Total</div><div class="stat-value">${total}</div></div>
    <div class="stat-item"><div class="stat-label">Avg</div><div class="stat-value">${avg}</div></div>`;

  // Trend function: compare last 3 weeks vs prior 3 weeks
  function getTrend(wm){
    const wkNums=weeks.filter(w=>procWeekMap[wm][w]>0);
    if(wkNums.length<4) return '→';
    const last3=wkNums.slice(-3).reduce((s,w)=>s+(procWeekMap[wm][w]||0),0);
    const prev3=wkNums.slice(-6,-3).reduce((s,w)=>s+(procWeekMap[wm][w]||0),0);
    if(prev3===0) return '→';
    if(last3<prev3) return '▼';
    if(last3>prev3) return '▲';
    return '→';
  }

  function heatClass(v){
    if(v===0||v===null||v===undefined) return 'h0';
    if(v===1) return 'h1';
    if(v===2) return 'h2';
    if(v===3) return 'h3';
    if(v===4) return 'h4';
    return 'h5';
  }
  function deltaClass(d){
    if(!d||d===0) return 'dzero';
    return d>0?'dpos':'dneg';
  }
  function trendClass(t){
    if(t==='▼') return 'trend-dn';
    if(t==='▲') return 'trend-up';
    return 'trend-fl';
  }

  // Build divider positions (every 4 weeks = fiscal month)
  function isDivider(weekIdx){
    const w=weeks[weekIdx];
    return w%4===0 && weekIdx<weeks.length-1;
  }

  // Build table
  let html=`<div class="section-heading">${curShift} · RECEIVING &amp; TRAINING</div>`;
  html+=`<div class="heatmap-container"><table class="hmap"><thead><tr>`;
  html+=`<th class="proc-th">LanID</th>`;
  weeks.forEach((w,i)=>{
    html+=`<th>${w}</th>`;
    if(isDivider(i)) html+=`<th style="width:6px;min-width:6px;background:transparent;"></th>`;
  });
  html+=`<th>Total</th></tr></thead><tbody>`;

  procs.forEach(wm=>{
    const dept=procDept[wm]||'';
    const isRecv=dept.toLowerCase()==='receiving';
    const isTrain=dept.toLowerCase()==='training';
    const dotColor=isTrain?'background:#a78bfa':isRecv?'background:var(--text)':'background:var(--muted)';
    const trend=getTrend(wm);
    const tc=trendClass(trend);
    const procTotal=Object.values(procWeekMap[wm]).reduce((s,v)=>s+v,0);
    html+=`<tr>`;
    html+=`<td class="proc-cell"><span class="dept-dot-sm" style="${dotColor}"></span>${wm}<span class="trend ${tc}">${trend}</span></td>`;
    weeks.forEach((w,i)=>{
      const v=procWeekMap[wm][w]||0;
      if(curMode==='raw'){
        const cls=heatClass(v);
        html+=`<td class="week-cell ${cls}" title="Week ${w}: ${v} error${v!==1?'s':''}">${v>0?v:''}</td>`;
      } else {
        const prev=i>0?(procWeekMap[wm][weeks[i-1]]||0):0;
        const d=i>0?v-prev:null;
        const cls=d===null?'week-cell h0':('week-cell '+deltaClass(d));
        const label=d===null?'':(d>0?'+'+d:d===0?'=':d);
        html+=`<td class="${cls}" title="Week ${w}: ${v} errors (Δ${d>=0?'+':''}${d})">${d!==null&&d!==0?label:''}</td>`;
      }
      if(isDivider(i)) html+=`<td class="divider-cell"></td>`;
    });
    html+=`<td class="total-cell">${procTotal}</td></tr>`;
  });

  // Week totals row
  html+=`<tr class="total-row"><td class="proc-cell">Total</td>`;
  weeks.forEach((w,i)=>{
    const wkTotal=procs.reduce((s,p)=>s+(procWeekMap[p][w]||0),0);
    html+=`<td class="week-cell" style="font-size:.65rem">${wkTotal||''}</td>`;
    if(isDivider(i)) html+=`<td class="divider-cell"></td>`;
  });
  const grandTotal=procs.reduce((s,p)=>s+Object.values(procWeekMap[p]).reduce((a,b)=>a+b,0),0);
  html+=`<td class="total-cell">${grandTotal}</td></tr>`;

  html+=`</tbody></table></div>`;
  document.getElementById('heatmap-container').innerHTML=html;
}
</script>
</body>
</html>
